<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arranging a Meeting & Encouraging Conversation</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--tg-theme-bg-color, #f0f2f5);
    color: var(--tg-theme-text-color, #1a1a2e);
    line-height: 1.6;
    padding: 20px;
  }

    .container { max-width: 800px; margin: 0 auto; }

    h1 { text-align: center; font-size: 1.6rem; margin-bottom: 10px; }

.subtitle {
    text-align: center;
    color: var(--tg-theme-hint-color, #666);
    margin-bottom: 30px;
    font-size: 0.95rem;
  }

  .section-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--tg-theme-text-color, #222);
    margin: 24px 0 4px;
  }

  .section-desc {
    font-size: 0.8rem;
    color: var(--tg-theme-hint-color, #888);
    margin-bottom: 14px;
  }

  /* ── PROGRESS ── */
  .progress-bar {
    height: 5px;
    background: var(--tg-theme-hint-color, #ccc);
    border-radius: 3px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--tg-theme-button-color, #5288c1);
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ── TAP-TO-MATCH CARDS ── */
  .match-card {
    background: var(--tg-theme-secondary-bg-color, #fff);
    border: 1.5px solid var(--tg-theme-hint-color, #ddd);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    cursor: pointer;
  }
  .match-card .phrase {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--tg-theme-text-color, #222);
    margin-bottom: 8px;
  }
  .match-card .cat-options {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .cat-btn {
    font-size: 0.72rem;
    padding: 5px 10px;
    border-radius: 20px;
    border: 1.5px solid var(--tg-theme-hint-color, #bbb);
    background: transparent;
    color: var(--tg-theme-text-color, #333);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    font-weight: 500;
  }
  .cat-btn:hover { background: rgba(82,136,193,0.1); }
  .cat-btn.selected-correct {
    background: rgba(76,175,80,0.15);
    border-color: #4caf50;
    color: #4caf50;
  }
  .cat-btn.selected-wrong {
    background: rgba(239,83,80,0.15);
    border-color: #ef5350;
    color: #ef5350;
  }
  .cat-btn.reveal-correct {
    background: rgba(76,175,80,0.10);
    border-color: #4caf50;
    color: #4caf50;
  }
  .match-card.done { opacity: 0.75; pointer-events: none; }

  /* ── MULTIPLE CHOICE ── */
  .mc-item {
    background: var(--tg-theme-secondary-bg-color, #fff);
    border: 1.5px solid var(--tg-theme-hint-color, #ddd);
    border-radius: 10px;
    padding: 13px 14px;
    margin-bottom: 12px;
  }
  .mc-item .situation {
    font-size: 0.85rem;
    color: var(--tg-theme-hint-color, #666);
    margin-bottom: 10px;
    font-style: italic;
    font-weight: 500;
  }
  .mc-options { display: flex; flex-direction: column; gap: 7px; }
  .mc-btn {
    text-align: left;
    font-size: 0.88rem;
    padding: 9px 12px;
    border-radius: 8px;
    border: 1.5px solid var(--tg-theme-hint-color, #ccc);
    background: transparent;
    color: var(--tg-theme-text-color, #222);
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
  }
  .mc-btn:hover { background: rgba(82,136,193,0.08); }
  .mc-btn.correct {
    background: rgba(76,175,80,0.15);
    border-color: #4caf50;
    color: #4caf50;
  }
  .mc-btn.wrong {
    background: rgba(239,83,80,0.15);
    border-color: #ef5350;
    color: #ef5350;
  }
  .mc-btn.reveal {
    background: rgba(76,175,80,0.10);
    border-color: #4caf50;
    color: #4caf50;
  }
  .mc-item.done { opacity: 0.75; pointer-events: none; }

  /* ── GAP-FILL ── */
  .gf-item {
    background: var(--tg-theme-secondary-bg-color, #fff);
    border: 1.5px solid var(--tg-theme-hint-color, #ddd);
    border-radius: 10px;
    padding: 13px 14px;
    margin-bottom: 12px;
  }
  .gf-sentence {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--tg-theme-text-color, #222);
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .gf-row { display: flex; gap: 8px; align-items: center; }
  .gf-input {
    flex: 1;
    padding: 8px 11px;
    border-radius: 8px;
    border: 1.5px solid var(--tg-theme-hint-color, #ccc);
    background: var(--tg-theme-bg-color, #f5f5f5);
    color: var(--tg-theme-text-color, #222);
    font-size: 0.9rem;
    font-weight: 500;
    outline: none;
    transition: border-color 0.15s;
  }
  .gf-input:focus { border-color: var(--tg-theme-button-color, #5288c1); }
  .gf-input.correct {
    background: rgba(76,175,80,0.15);
    border-color: #4caf50;
    color: #4caf50;
  }
  .gf-input.wrong {
    background: rgba(239,83,80,0.15);
    border-color: #ef5350;
    color: #ef5350;
  }
  .gf-check-btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
    background: var(--tg-theme-button-color, #5288c1);
    color: var(--tg-theme-button-text-color, #fff);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }
  .gf-feedback {
    font-size: 0.8rem;
    margin-top: 6px;
    font-weight: 500;
    min-height: 18px;
  }
  .gf-feedback.ok { color: #4caf50; }
  .gf-feedback.err { color: #ef5350; }
  .gf-item.done .gf-check-btn { display: none; }

  /* ── SCORE / SUBMIT ── */
  .submit-btn {
    display: block;
    width: 100%;
    margin: 28px 0 10px;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: var(--tg-theme-button-color, #5288c1);
    color: var(--tg-theme-button-text-color, #fff);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .score-box {
    display: none;
    background: var(--tg-theme-secondary-bg-color, #fff);
    border-radius: 14px;
    padding: 24px 20px;
    text-align: center;
    margin-top: 20px;
  }
  .score-box .big { font-size: 2.2rem; font-weight: 800; color: var(--tg-theme-button-color, #5288c1); }
  .score-box .label { font-size: 0.9rem; color: var(--tg-theme-hint-color, #888); margin-top: 4px; font-weight: 500; }

  .reset-btn {
    margin-top: 16px;
    padding: 10px 24px;
    border-radius: 10px;
    border: 1.5px solid var(--tg-theme-hint-color, #ccc);
    background: var(--tg-theme-bg-color, #f5f5f5);
    color: var(--tg-theme-text-color, #222);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>Arranging a Meeting &amp; Encouraging Conversation</h1>
<p class="subtitle">25 questions · 3 sections</p>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<!-- ══════════════════════════════════════
     SECTION 1 — TAP-TO-MATCH
════════════════════════════════════════ -->
<div class="section-title">Section 1 — Tap to Match</div>
<p class="section-desc">Tap the correct category for each phrase.</p>
<div id="matchSection"></div>

<!-- ══════════════════════════════════════
     SECTION 2 — MULTIPLE CHOICE
════════════════════════════════════════ -->
<div class="section-title">Section 2 — Multiple Choice</div>
<p class="section-desc">Choose the most appropriate phrase for each situation.</p>
<div id="mcSection"></div>

<!-- ══════════════════════════════════════
     SECTION 3 — GAP-FILL
════════════════════════════════════════ -->
<div class="section-title">Section 3 — Gap-fill</div>
<p class="section-desc">Type the missing word to complete each phrase.</p>
<div id="gfSection"></div>

<button class="submit-btn" id="submitBtn" onclick="submitAll()">Submit &amp; See Results</button>

<div class="score-box" id="scoreBox">
  <div class="big" id="scoreNum"></div>
  <div class="label" id="scoreLabel"></div>
  <br>
  <button class="reset-btn" onclick="resetAll()">Try Again</button>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── Back button
if (tg?.BackButton) {
  tg.BackButton.show();
  tg.BackButton.onClick(() => { window.location.href = '../'; });
}

// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════

const CATEGORIES = [
  'Introducing yourself (email)',
  'Making a follow-up call',
  'Responding to a follow-up call',
  'Arranging to meet'
];

const matchData = [
  { phrase: "She recommended you to me as ...", cat: 'Introducing yourself (email)' },
  { phrase: "I'm calling about the email I sent you regarding ...", cat: 'Making a follow-up call' },
  { phrase: "Let's say, provisionally, Tuesday the 13th at 11.00.", cat: 'Arranging to meet' },
  { phrase: "Thanks. I wanted to speak to you about...", cat: 'Responding to a follow-up call' },
  { phrase: "I was given your details by ...", cat: 'Introducing yourself (email)' },
  { phrase: "I wondered if you'd had time to...?", cat: 'Making a follow-up call' },
  { phrase: "I suggest we meet to discuss things further.", cat: 'Arranging to meet' },
  { phrase: "I wanted to see if you are still interested in...", cat: 'Making a follow-up call' },
  { phrase: "Yes, I remember.", cat: 'Responding to a follow-up call' },
  { phrase: "Thanks for responding so quickly.", cat: 'Responding to a follow-up call' },
  { phrase: "Fine, whatever's best for you.", cat: 'Arranging to meet' },
  { phrase: "My name's... and I work for ...", cat: 'Introducing yourself (email)' },
];

const mcData = [
  {
    situation: "You're emailing someone for the first time. You got their contact from a colleague. You write:",
    options: ["I was given your details by ...", "I wondered if you'd had time to...?"],
    correct: 0
  },
  {
    situation: "You want to know the best way to get to their office. You ask:",
    options: ["Will I have time to catch that one?", "Is it best by taxi or public transport?"],
    correct: 1
  },
  {
    situation: "Your colleague mentions she's been to three company events this year. You respond with interest:",
    options: ["That sounds interesting.", "By the way..."],
    correct: 0
  },
  {
    situation: "You want to keep the conversation going but switch topic slightly. You say:",
    options: ["Really?", "By the way..."],
    correct: 1
  },
  {
    situation: "You've just arrived at a networking event and see someone you recognise from earlier. You say:",
    options: ["Hello. I saw you earlier but I didn't have a chance to speak to you.", "Hi, I don't think we've met."],
    correct: 0
  },
  {
    situation: "Someone tells you bad news. You respond:",
    options: ["Oh, I'm sorry to hear that.", "What a coincidence!"],
    correct: 0
  },
  {
    situation: "You want to confirm travel plans. You say:",
    options: ["Let me know where you're staying and I'll email you a map and directions.", "When would you like to meet?"],
    correct: 0
  },
];

const gfData = [
  { before: "I'm calling about the email I sent you", hint: "r", answer: "regarding", after: "..." },
  { before: "I", hint: "w", answer: "wondered", after: "if you'd had time to...?" },
  { before: "Let's say,", hint: "p", answer: "provisionally", after: ", Tuesday the 13th at 11.00." },
  { before: "I'll get my assistant to call you later today to", hint: "c", answer: "confirm", after: "." },
  { before: "Let me know if you need a taxi and I'll", hint: "b", answer: "book", after: "one for you." },
  { before: "Hi, I don't think we've", hint: "m", answer: "met", after: "." },
  { before: "Is this your", hint: "f", answer: "first", after: "company event?" },
  { before: "I've heard ... — is that", hint: "t", answer: "true", after: "?" },
];

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let matchAnswers = new Array(matchData.length).fill(null); // null | true | false
let mcAnswers    = new Array(mcData.length).fill(null);
let gfAnswers    = new Array(gfData.length).fill(null);

const TOTAL = matchData.length + mcData.length + gfData.length; // 27 (12+7+8)

function countAnswered() {
  const m = matchAnswers.filter(x => x !== null).length;
  const c = mcAnswers.filter(x => x !== null).length;
  const g = gfAnswers.filter(x => x !== null).length;
  return m + c + g;
}

function updateProgress() {
  const pct = (countAnswered() / TOTAL) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ═══════════════════════════════════════
// SECTION 1 — TAP-TO-MATCH
// ═══════════════════════════════════════
function buildMatch() {
  const container = document.getElementById('matchSection');
  matchData.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'match-card';
    card.id = `match-card-${idx}`;

    const phraseEl = document.createElement('div');
    phraseEl.className = 'phrase';
    phraseEl.textContent = item.phrase;
    card.appendChild(phraseEl);

    const opts = document.createElement('div');
    opts.className = 'cat-options';

    CATEGORIES.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.textContent = cat;
      btn.onclick = () => selectCat(idx, cat, btn, opts);
      opts.appendChild(btn);
    });

    card.appendChild(opts);
    container.appendChild(card);
  });
}

function selectCat(idx, chosen, btn, opts) {
  const correct = matchData[idx].cat;
  const isCorrect = chosen === correct;
  matchAnswers[idx] = isCorrect;

  // Mark all buttons
  opts.querySelectorAll('.cat-btn').forEach(b => {
    if (b.textContent === correct) b.classList.add('reveal-correct');
  });
  if (isCorrect) {
    btn.classList.add('selected-correct');
  } else {
    btn.classList.add('selected-wrong');
  }

  document.getElementById(`match-card-${idx}`).classList.add('done');
  updateProgress();
}

// ═══════════════════════════════════════
// SECTION 2 — MULTIPLE CHOICE
// ═══════════════════════════════════════
function buildMC() {
  const container = document.getElementById('mcSection');
  mcData.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'mc-item';
    div.id = `mc-item-${idx}`;

    const sit = document.createElement('div');
    sit.className = 'situation';
    sit.textContent = item.situation;
    div.appendChild(sit);

    const opts = document.createElement('div');
    opts.className = 'mc-options';

    item.options.forEach((opt, oi) => {
      const btn = document.createElement('button');
      btn.className = 'mc-btn';
      btn.textContent = opt;
      btn.onclick = () => selectMC(idx, oi, opts);
      opts.appendChild(btn);
    });

    div.appendChild(opts);
    container.appendChild(div);
  });
}

function selectMC(idx, chosen, opts) {
  const correct = mcData[idx].correct;
  const isCorrect = chosen === correct;
  mcAnswers[idx] = isCorrect;

  opts.querySelectorAll('.mc-btn').forEach((btn, oi) => {
    if (oi === correct) btn.classList.add('reveal');
    if (oi === chosen && !isCorrect) btn.classList.add('wrong');
    if (oi === chosen && isCorrect) { btn.classList.remove('reveal'); btn.classList.add('correct'); }
  });

  document.getElementById(`mc-item-${idx}`).classList.add('done');
  updateProgress();
}

// ═══════════════════════════════════════
// SECTION 3 — GAP-FILL
// ═══════════════════════════════════════
function buildGF() {
  const container = document.getElementById('gfSection');
  gfData.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'gf-item';
    div.id = `gf-item-${idx}`;

    const sentence = document.createElement('div');
    sentence.className = 'gf-sentence';
    sentence.textContent = `${item.before} ${item.hint}_______ ${item.after}`;
    div.appendChild(sentence);

    const row = document.createElement('div');
    row.className = 'gf-row';

    const input = document.createElement('input');
    input.className = 'gf-input';
    input.type = 'text';
    input.placeholder = item.hint + '_______';
    input.id = `gf-input-${idx}`;
    input.addEventListener('keydown', e => { if (e.key === 'Enter') checkGF(idx); });

    const checkBtn = document.createElement('button');
    checkBtn.className = 'gf-check-btn';
    checkBtn.textContent = 'Check';
    checkBtn.onclick = () => checkGF(idx);

    row.appendChild(input);
    row.appendChild(checkBtn);
    div.appendChild(row);

    const feedback = document.createElement('div');
    feedback.className = 'gf-feedback';
    feedback.id = `gf-fb-${idx}`;
    div.appendChild(feedback);

    container.appendChild(div);
  });
}

function checkGF(idx) {
  const input = document.getElementById(`gf-input-${idx}`);
  const fb = document.getElementById(`gf-fb-${idx}`);
  const val = input.value.trim().toLowerCase();
  const correct = gfData[idx].answer.toLowerCase();
  const isCorrect = val === correct;
  gfAnswers[idx] = isCorrect;

  if (isCorrect) {
    input.classList.add('correct');
    fb.textContent = '✓ Correct!';
    fb.className = 'gf-feedback ok';
  } else {
    input.classList.add('wrong');
    fb.textContent = `✗ The answer is: ${gfData[idx].answer}`;
    fb.className = 'gf-feedback err';
  }

  document.getElementById(`gf-item-${idx}`).classList.add('done');
  input.disabled = true;
  updateProgress();
}

// ═══════════════════════════════════════
// SUBMIT
// ═══════════════════════════════════════
function submitAll() {
  // Auto-check any unanswered gap-fills
  gfData.forEach((_, idx) => {
    if (gfAnswers[idx] === null) checkGF(idx);
  });

  // Score
  const score =
    matchAnswers.filter(Boolean).length +
    mcAnswers.filter(Boolean).length +
    gfAnswers.filter(Boolean).length;

  document.getElementById('scoreNum').textContent = `${score} / ${TOTAL}`;
  const pct = Math.round((score / TOTAL) * 100);
  let msg = pct === 100 ? '🎉 Perfect score!' : pct >= 80 ? '👏 Great job!' : pct >= 60 ? '👍 Good effort!' : '📚 Keep practising!';
  document.getElementById('scoreLabel').textContent = `${pct}% — ${msg}`;

  const scoreBox = document.getElementById('scoreBox');
  scoreBox.style.display = 'block';
  scoreBox.scrollIntoView({ behavior: 'smooth' });

  document.getElementById('submitBtn').disabled = true;

  if (tg?.sendData) {
    tg.sendData(JSON.stringify({
      exercise: 'meeting-conversation',
      score,
      total: TOTAL,
      pct
    }));
  }
}

// ═══════════════════════════════════════
// RESET
// ═══════════════════════════════════════
function resetAll() {
  matchAnswers = new Array(matchData.length).fill(null);
  mcAnswers    = new Array(mcData.length).fill(null);
  gfAnswers    = new Array(gfData.length).fill(null);

  document.getElementById('matchSection').innerHTML = '';
  document.getElementById('mcSection').innerHTML = '';
  document.getElementById('gfSection').innerHTML = '';
  document.getElementById('scoreBox').style.display = 'none';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('progressFill').style.width = '0%';

  buildMatch();
  buildMC();
  buildGF();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
buildMatch();
buildMC();
buildGF();
</script>
</body>
</html>
