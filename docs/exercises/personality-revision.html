<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personality & Character</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--tg-theme-bg-color, #f0f2f5);
    color: var(--tg-theme-text-color, #1a1a2e);
    line-height: 1.6;
    padding: 20px;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
  }

  h1 {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: 10px;
  }

  .subtitle {
    text-align: center;
    color: var(--tg-theme-hint-color, #666);
    margin-bottom: 30px;
    font-size: 0.95rem;
  }

  /* Navigation */
  .nav {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 30px;
    flex-wrap: wrap;
  }

  .nav-btn {
    padding: 10px 20px;
    border: 2px solid var(--tg-theme-button-color, #6c63ff);
    background: var(--tg-theme-secondary-bg-color, white);
    color: var(--tg-theme-button-color, #6c63ff);
    border-radius: 25px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.2s;
  }

  .nav-btn:hover { opacity: 0.85; }

  .nav-btn.active {
    background: var(--tg-theme-button-color, #6c63ff);
    color: var(--tg-theme-button-text-color, white);
  }

  .nav-btn .check {
    display: none;
    margin-left: 4px;
  }

  .nav-btn.done .check { display: inline; }

  /* Exercise sections */
  .exercise {
    display: none;
    background: var(--tg-theme-secondary-bg-color, white);
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  .exercise.active { display: block; }

  .exercise h2 {
    font-size: 1.3rem;
    margin-bottom: 6px;
    color: var(--tg-theme-button-color, #6c63ff);
  }

  .exercise .instructions {
    color: var(--tg-theme-hint-color, #666);
    margin-bottom: 20px;
    font-size: 0.9rem;
  }

  /* Score bar */
  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding: 12px 16px;
    background: var(--tg-theme-bg-color, #f8f7ff);
    border-radius: 10px;
  }

  .score-text { font-weight: 600; color: var(--tg-theme-button-color, #6c63ff); }

  .btn {
    padding: 8px 20px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.2s;
  }

  .btn-check {
    background: var(--tg-theme-button-color, #6c63ff);
    color: var(--tg-theme-button-text-color, white);
  }

  .btn-check:hover { opacity: 0.85; }
  .btn-reset { background: #e8e6ff; color: var(--tg-theme-button-color, #6c63ff); }
  .btn-reset:hover { opacity: 0.85; }
  .btn-group { display: flex; gap: 8px; }

  /* ===== Multiple choice ===== */
  .quiz-item {
    padding: 16px;
    border: 1px solid #eee;
    border-radius: 10px;
    margin-bottom: 10px;
    transition: border-color 0.3s;
  }

  .quiz-item.correct { border-color: #4caf50; background: #f1f8e9; color: #2e7d32; }
  .quiz-item.incorrect { border-color: #ef5350; background: #fce4ec; color: #c62828; }

  .quiz-definition {
    font-size: 0.95rem;
    margin-bottom: 8px;
  }

  .quiz-options {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }

  .quiz-option {
    flex: 1;
    padding: 10px 16px;
    border: 2px solid #e0dcff;
    border-radius: 8px;
    background: var(--tg-theme-bg-color, #f8f7ff);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    text-align: center;
    transition: all 0.2s;
  }

  .quiz-option:hover { border-color: var(--tg-theme-button-color, #6c63ff); }
  .quiz-option.selected { border-color: var(--tg-theme-button-color, #6c63ff); background: var(--tg-theme-button-color, #6c63ff); color: var(--tg-theme-button-text-color, white); }
  .quiz-option.correct-opt { border-color: #4caf50; background: #e8f5e9; color: #2e7d32; }
  .quiz-option.incorrect-opt { border-color: #ef5350; background: #fce4ec; color: #c62828; }
  .quiz-option.disabled { pointer-events: none; }

  /* ===== Gap fill ===== */
  .gap-item {
    padding: 16px;
    border: 1px solid #eee;
    border-radius: 10px;
    margin-bottom: 10px;
    transition: border-color 0.3s;
  }

  .gap-item.correct { border-color: #4caf50; background: #f1f8e9; color: #2e7d32; }
  .gap-item.incorrect { border-color: #ef5350; background: #fce4ec; color: #c62828; }

  .gap-sentence {
    font-size: 0.95rem;
    margin-bottom: 8px;
    line-height: 1.7;
  }

  .gap-input {
    width: 160px;
    padding: 6px 10px;
    border: 2px solid #e0dcff;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.9rem;
    background: var(--tg-theme-bg-color, #f8f7ff);
    color: var(--tg-theme-text-color, #1a1a2e);
    transition: border-color 0.2s;
  }

  .gap-input:focus {
    outline: none;
    border-color: var(--tg-theme-button-color, #6c63ff);
  }

  .gap-input.correct-input { border-color: #4caf50; background: #e8f5e9; color: #2e7d32; }
  .gap-input.incorrect-input { border-color: #ef5350; background: #fce4ec; color: #c62828; }
  .gap-input.disabled { pointer-events: none; }

  .gap-answer {
    display: none;
    font-size: 0.85rem;
    color: #4caf50;
    margin-top: 4px;
    font-weight: 500;
  }

  .gap-answer.show { display: block; }

  /* Results */
  .final-results {
    display: none;
    text-align: center;
    padding: 40px 20px;
    background: var(--tg-theme-secondary-bg-color, white);
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  .final-results.active { display: block; }

  .final-results h2 {
    font-size: 1.5rem;
    margin-bottom: 20px;
    color: var(--tg-theme-button-color, #6c63ff);
  }

  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    max-width: 400px;
    margin: 0 auto 20px;
  }

  .result-card {
    padding: 16px;
    background: var(--tg-theme-bg-color, #f8f7ff);
    border-radius: 10px;
  }

  .result-card .label { font-size: 0.8rem; color: var(--tg-theme-hint-color, #999); }
  .result-card .value { font-size: 1.4rem; font-weight: 700; color: var(--tg-theme-button-color, #6c63ff); }

  .total-score {
    font-size: 1.2rem;
    font-weight: 700;
    margin-top: 10px;
  }

  /* Mobile */
  @media (max-width: 600px) {
    .exercise { padding: 20px; }
    .nav-btn { padding: 8px 14px; font-size: 0.8rem; }
    .quiz-options { flex-direction: column; gap: 6px; }
    .gap-input { width: 140px; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>Personality & Character</h1>
  <p class="subtitle">Vocabulary revision</p>

  <div class="nav">
    <button class="nav-btn active" onclick="showExercise(0)">1. Phrases<span class="check"> &#10003;</span></button>
    <button class="nav-btn" onclick="showExercise(1)">2. Adjectives<span class="check"> &#10003;</span></button>
  </div>

  <!-- EXERCISE 1: Personality Phrases -->
  <div class="exercise active" id="ex1">
    <h2>Exercise 1: Personality Phrases</h2>
    <p class="instructions">Read the description and choose the correct phrase.</p>
    <div class="score-bar">
      <span class="score-text" id="score1">0 / 8</span>
      <div class="btn-group">
        <button class="btn btn-check" onclick="checkEx1()">Check</button>
        <button class="btn btn-reset" onclick="resetEx1()">Reset</button>
      </div>
    </div>
    <div id="quiz1-items"></div>
  </div>

  <!-- EXERCISE 2: Adjectives (gap-fill) -->
  <div class="exercise" id="ex2">
    <h2>Exercise 2: Adjectives</h2>
    <p class="instructions">Read the sentence and type the missing adjective. The first letter is given.</p>
    <div class="score-bar">
      <span class="score-text" id="score2">0 / 10</span>
      <div class="btn-group">
        <button class="btn btn-check" onclick="checkEx2()">Check</button>
        <button class="btn btn-reset" onclick="resetEx2()">Reset</button>
      </div>
    </div>
    <div id="gap-items"></div>
  </div>

  <!-- RESULTS -->
  <div class="final-results" id="results">
    <h2>Results</h2>
    <div class="results-grid">
      <div class="result-card"><div class="label">Phrases</div><div class="value" id="r1">-</div></div>
      <div class="result-card"><div class="label">Adjectives</div><div class="value" id="r2">-</div></div>
    </div>
    <div class="total-score" id="total-score"></div>
    <br>
    <button class="btn btn-reset" onclick="resetAll()">Start over</button>
  </div>
</div>

<script>
// ===================== TELEGRAM =====================
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.BackButton.show();
  tg.BackButton.onClick(() => { window.location.href = '../'; });
}

// ===================== DATA =====================

const quiz1Data = [
  { def: "You like having friends around and enjoy being with people", correct: "a people person", wrong: "a creature of habit" },
  { def: "You can\u2019t stand getting up early and being cheerful in the morning", correct: "not a morning person", wrong: "down-to-earth" },
  { def: "You\u2019re quick, clever and you make people laugh", correct: "witty", wrong: "spontaneous" },
  { def: "You get an idea and do it immediately, no hesitation", correct: "spontaneous", wrong: "cautious" },
  { def: "You\u2019re fun to be with and everyone enjoys your company", correct: "a good laugh", wrong: "a computer geek" },
  { def: "You\u2019re very practical and realistic, not pretentious", correct: "down-to-earth", wrong: "eccentric" },
  { def: "You spend hours in front of your computer", correct: "a computer geek", wrong: "a social butterfly" },
  { def: "You prefer to stay alone and don\u2019t share much about yourself", correct: "keep yourself to yourself", wrong: "the life of the party" }
];

const gapData = [
  { sentence: "My friend always has time for me when I\u2019ve got a problem. She seems to understand and wants to help. She\u2019s very", hint: "s", answer: "sympathetic" },
  { sentence: "My colleague always takes a long time to make up his mind. He wants to think about everything carefully before making a decision. He\u2019s quite", hint: "c", answer: "cautious" },
  { sentence: "When he started his first job, he thought everything would be easy and that all his colleagues would be really nice to him. He was so", hint: "n", answer: "naive" },
  { sentence: "Everything about him seems honest and sincere. What you see is what you get. He\u2019s very", hint: "g", answer: "genuine" },
  { sentence: "She\u2019s really friendly and she enjoys meeting new people. She\u2019s really", hint: "o", answer: "outgoing" },
  { sentence: "My old school teacher was not very kind. She often laughed at students when they made mistakes. She was quite", hint: "m", answer: "mean" },
  { sentence: "She can adapt to almost any situation and doesn\u2019t mind when plans change. She\u2019s very", hint: "f", answer: "flexible" },
  { sentence: "He acts a bit strange sometimes and wears the oddest clothes. He\u2019s a bit", hint: "e", answer: "eccentric" },
  { sentence: "I can tell her any secret and I know she\u2019ll never tell anyone else. She\u2019s completely", hint: "t", answer: "trustworthy" },
  { sentence: "One minute he\u2019s happy, the next he\u2019s angry for no reason. He\u2019s so", hint: "m", answer: "moody" }
];

// ===================== NAVIGATION =====================

const exercises = ['ex1', 'ex2'];
const navBtns = document.querySelectorAll('.nav-btn');
let scores = [0, 0];
let checked = [false, false];

function showExercise(idx) {
  document.querySelectorAll('.exercise, .final-results').forEach(el => el.classList.remove('active'));
  navBtns.forEach(b => b.classList.remove('active'));
  document.getElementById(exercises[idx]).classList.add('active');
  navBtns[idx].classList.add('active');
}

// ===================== UTILS =====================

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===================== EXERCISE 1: Personality Phrases =====================

let ex1Selections = new Array(quiz1Data.length).fill(null);

function buildEx1() {
  const container = document.getElementById('quiz1-items');
  quiz1Data.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'quiz-item';
    const options = Math.random() > 0.5
      ? [{ text: item.correct, isCorrect: true }, { text: item.wrong, isCorrect: false }]
      : [{ text: item.wrong, isCorrect: false }, { text: item.correct, isCorrect: true }];
    div.innerHTML = `
      <div class="quiz-definition">${i + 1}. ${item.def}</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="${i}" data-correct="${options[0].isCorrect}" onclick="selectOption(this)">${options[0].text}</button>
        <button class="quiz-option" data-q="${i}" data-correct="${options[1].isCorrect}" onclick="selectOption(this)">${options[1].text}</button>
      </div>
    `;
    container.appendChild(div);
  });
}

function selectOption(btn) {
  if (btn.classList.contains('disabled')) return;
  const qIdx = btn.dataset.q;
  document.querySelectorAll(`.quiz-option[data-q="${qIdx}"]`).forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  ex1Selections[qIdx] = btn.dataset.correct === 'true';
}

function checkEx1() {
  let score = 0;
  quiz1Data.forEach((_, i) => {
    const buttons = document.querySelectorAll(`.quiz-option[data-q="${i}"]`);
    const wrapper = buttons[0].closest('.quiz-item');
    buttons.forEach(btn => {
      btn.classList.add('disabled');
      if (btn.dataset.correct === 'true') btn.classList.add('correct-opt');
    });
    if (ex1Selections[i] === true) {
      score++;
      wrapper.classList.add('correct');
    } else {
      wrapper.classList.add('incorrect');
      buttons.forEach(btn => {
        if (btn.dataset.correct === 'false' && btn.classList.contains('selected')) btn.classList.add('incorrect-opt');
      });
    }
  });
  scores[0] = score;
  checked[0] = true;
  document.getElementById('score1').textContent = `${score} / 8`;
  navBtns[0].classList.add('done');
  checkAllDone();
}

function resetEx1() {
  ex1Selections = new Array(quiz1Data.length).fill(null);
  quiz1Data.forEach((_, i) => {
    const buttons = document.querySelectorAll(`.quiz-option[data-q="${i}"]`);
    buttons[0].closest('.quiz-item').classList.remove('correct', 'incorrect');
    buttons.forEach(btn => btn.classList.remove('selected', 'correct-opt', 'incorrect-opt', 'disabled'));
  });
  scores[0] = 0; checked[0] = false;
  document.getElementById('score1').textContent = '0 / 8';
  navBtns[0].classList.remove('done');
}

// ===================== EXERCISE 2: Adjectives (Gap-fill) =====================

function buildEx2() {
  const container = document.getElementById('gap-items');
  gapData.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'gap-item';
    const underscores = '_'.repeat(item.answer.length - 1);
    div.innerHTML = `
      <div class="gap-sentence">${i + 1}. ${item.sentence} <input type="text" class="gap-input" data-idx="${i}" placeholder="${item.hint}${underscores}" autocomplete="off" autocapitalize="off" spellcheck="false">.</div>
      <div class="gap-answer" id="answer-${i}">Correct answer: ${item.answer}</div>
    `;
    container.appendChild(div);
  });
}

function checkEx2() {
  let score = 0;
  gapData.forEach((item, i) => {
    const input = document.querySelector(`.gap-input[data-idx="${i}"]`);
    const wrapper = input.closest('.gap-item');
    const userAnswer = input.value.trim().toLowerCase();
    input.classList.add('disabled');

    if (userAnswer === item.answer.toLowerCase()) {
      score++;
      wrapper.classList.add('correct');
      input.classList.add('correct-input');
    } else {
      wrapper.classList.add('incorrect');
      input.classList.add('incorrect-input');
      document.getElementById(`answer-${i}`).classList.add('show');
    }
  });
  scores[1] = score;
  checked[1] = true;
  document.getElementById('score2').textContent = `${score} / 10`;
  navBtns[1].classList.add('done');
  checkAllDone();
}

function resetEx2() {
  gapData.forEach((_, i) => {
    const input = document.querySelector(`.gap-input[data-idx="${i}"]`);
    const wrapper = input.closest('.gap-item');
    input.value = '';
    input.classList.remove('correct-input', 'incorrect-input', 'disabled');
    wrapper.classList.remove('correct', 'incorrect');
    document.getElementById(`answer-${i}`).classList.remove('show');
  });
  scores[1] = 0; checked[1] = false;
  document.getElementById('score2').textContent = '0 / 10';
  navBtns[1].classList.remove('done');
}

// ===================== RESULTS =====================

function checkAllDone() {
  if (checked.every(c => c)) {
    let resultsBtn = document.getElementById('see-results-btn');
    if (!resultsBtn) {
      resultsBtn = document.createElement('button');
      resultsBtn.id = 'see-results-btn';
      resultsBtn.className = 'btn btn-check';
      resultsBtn.style.cssText = 'display:block;margin:20px auto 0;padding:12px 32px;font-size:1rem;';
      resultsBtn.textContent = 'See Results';
      resultsBtn.onclick = showResults;
    }
    const activeEx = document.querySelector('.exercise.active');
    if (activeEx && !activeEx.querySelector('#see-results-btn')) {
      activeEx.appendChild(resultsBtn);
    }
  }
}

function showResults() {
  document.querySelectorAll('.exercise').forEach(el => el.classList.remove('active'));
  navBtns.forEach(b => b.classList.remove('active'));
  document.getElementById('results').classList.add('active');
  document.getElementById('r1').textContent = `${scores[0]}/8`;
  document.getElementById('r2').textContent = `${scores[1]}/10`;
  const total = scores.reduce((a, b) => a + b, 0);
  const max = 18;
  document.getElementById('total-score').textContent = `Total: ${total} / ${max} (${Math.round((total / max) * 100)}%)`;

  if (tg) {
    tg.sendData(JSON.stringify({
      exercise: 'personality-revision',
      scores: { phrases: scores[0], adjectives: scores[1] },
      total: total,
      max: max
    }));
  }
}

function resetAll() {
  resetEx1(); resetEx2();
  document.getElementById('results').classList.remove('active');
  showExercise(0);
}

// ===================== INIT =====================
buildEx1();
buildEx2();
</script>

</body>
</html>
